    <!-- ============================================================
         GA4 + Consent Mode v2
         Default: all consent DENIED until user explicitly accepts.
         The gtag script is loaded immediately (required by Consent Mode)
         but no measurement data is sent until consent is granted.
         GA4 Measurement ID: G-M5FP0YKFVQ — superwitstech.com
    ============================================================ -->
    <script>
      // Step 1 — Initialise dataLayer and gtag helper BEFORE the gtag.js script
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Step 2 — Set default consent state (all denied)
      // GA4 will honour these defaults and not send measurement data
      gtag('consent', 'default', {
        'ad_storage':            'denied',
        'ad_user_data':          'denied',
        'ad_personalization':    'denied',
        'analytics_storage':     'denied',
        'functionality_storage': 'granted',  // needed for site to work
        'security_storage':      'granted',  // needed for site to work
        'wait_for_update':       500          // ms to wait for consent update before sending
      });

      // Step 3 — Check localStorage for a previously saved consent decision
      // If the user already accepted, immediately upgrade consent so GA4
      // can start measuring without waiting for the banner to re-render.
      (function() {
        try {
          var stored = localStorage.getItem('sw_cookie_consent');
          if (stored) {
            var data = JSON.parse(stored);
            var accepted = data.accepted || {};
            if (accepted.analytics) {
              gtag('consent', 'update', {
                'analytics_storage': 'granted'
              });
            }
            if (accepted.marketing) {
              gtag('consent', 'update', {
                'ad_storage':         'granted',
                'ad_user_data':       'granted',
                'ad_personalization': 'granted'
              });
            }
          }
        } catch(e) {}
      })();
    </script>

    <!-- Step 4 — Load the gtag.js library AFTER consent defaults are set -->
    <!-- async: gtag.js loads in parallel; it does NOT block the HTML parser -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M5FP0YKFVQ"></script>

    <!-- Step 5 — GA4 config + event tracking
         defer: this script runs AFTER the document is parsed, eliminating the
         render-blocking penalty (~1,350ms) flagged by PageSpeed Insights.
         It is safe to defer because gtag() calls are queued in dataLayer until
         gtag.js is ready, so no events are lost. -->
    <script defer>
      // Wrap in DOMContentLoaded so DOM queries (querySelectorAll) are safe
      document.addEventListener('DOMContentLoaded', function() {
        // Configure GA4 (respects consent state set above)
        gtag('js', new Date());
        gtag('config', 'G-M5FP0YKFVQ', { 'anonymize_ip': true });

        // Scroll depth tracking — fires at 25%, 50%, 75%, 90% scroll
        document.addEventListener('scroll', function() {
          var scrollPercent = Math.round((window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100);
          var milestones = [25, 50, 75, 90];
          milestones.forEach(function(m) {
            if (scrollPercent >= m && !window['scrolled_' + m]) {
              window['scrolled_' + m] = true;
              gtag('event', 'scroll_depth', { 'percent_scrolled': m, 'page_path': window.location.pathname });
            }
          });
        });

        // Time on page — fires at 30 seconds and 60 seconds
        setTimeout(function() {
          gtag('event', 'time_on_page', { 'seconds': 30, 'page_path': window.location.pathname });
        }, 30000);
        setTimeout(function() {
          gtag('event', 'time_on_page', { 'seconds': 60, 'page_path': window.location.pathname });
        }, 60000);

        // Outbound link tracking — fires when any external link is clicked
        document.querySelectorAll('a[href^="http"]').forEach(function(link) {
          if (!link.href.includes('superwitstech.com')) {
            link.addEventListener('click', function() {
              gtag('event', 'outbound_click', { 'destination': link.href });
            });
          }
        });
      });
    </script>
